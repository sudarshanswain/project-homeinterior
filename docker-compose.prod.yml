services:
  nginx:
    image: nginx:1.27-alpine
    container_name: homeinterior-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    profiles:
      - prod

  app:
    ports: []
    expose:
      - "3000"
